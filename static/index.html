<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5sec_split — 동영상 분할</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0b0b14;
  --card:#13131f;
  --border:#252538;
  --accent:#7c5cfc;
  --accent-glow:#7c5cfc44;
  --success:#00d68f;
  --error:#ff6b6b;
  --text:#e2e2ee;
  --text2:#6e7191;
  --radius:14px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.container{
  width:100%;
  max-width:520px;
}

h1{
  font-size:1.6rem;
  font-weight:700;
  text-align:center;
  margin-bottom:4px;
  letter-spacing:-.02em;
}
h1 span{color:var(--accent)}

.subtitle{
  text-align:center;
  color:var(--text2);
  font-size:.85rem;
  margin-bottom:28px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px;
}

/* ─── Drop Zone ─── */
.dropzone{
  border:2px dashed var(--border);
  border-radius:12px;
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  transition:all .25s;
  position:relative;
}
.dropzone:hover,.dropzone.drag-over{
  border-color:var(--accent);
  background:var(--accent-glow);
}
.dropzone-icon{font-size:2.4rem;margin-bottom:8px;display:block;opacity:.7}
.dropzone-text{color:var(--text2);font-size:.9rem;line-height:1.5}
.dropzone-text strong{color:var(--text);font-weight:600}
.dropzone input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
}

/* ─── File Info ─── */
.file-info{
  display:none;
  background:#1a1a2a;
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  margin-top:16px;
  gap:10px;
  align-items:center;
}
.file-info.show{display:flex}
.file-icon{font-size:1.5rem;flex-shrink:0}
.file-meta{flex:1;min-width:0}
.file-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-detail{color:var(--text2);font-size:.78rem;margin-top:2px}
.file-remove{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-size:1.1rem;padding:4px;border-radius:6px;transition:color .2s;
}
.file-remove:hover{color:var(--error)}

/* ─── Form ─── */
.form-section{display:none;margin-top:20px}
.form-section.show{display:block}

.field{margin-bottom:16px}
.field label{
  display:block;font-size:.82rem;font-weight:600;
  color:var(--text2);margin-bottom:6px;letter-spacing:.02em;
}
.field input{
  width:100%;
  background:#1a1a2a;
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  color:var(--text);
  font-size:.92rem;
  outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--accent)}
.field .hint{font-size:.75rem;color:var(--text2);margin-top:4px}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  font-size:.95rem;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-primary{
  background:var(--accent);
  color:#fff;
}
.btn-primary:hover:not(:disabled){
  background:#6a4aee;
  transform:translateY(-1px);
  box-shadow:0 6px 20px var(--accent-glow);
}
.btn-primary:disabled{
  opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;
}
.btn-secondary{
  background:#1a1a2a;
  color:var(--text);
  border:1px solid var(--border);
  margin-top:12px;
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* ─── Progress ─── */
.progress-section{display:none;margin-top:20px}
.progress-section.show{display:block}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:.82rem;color:var(--text2);margin-bottom:8px;
}
.progress-bar{
  width:100%;height:10px;
  background:#1a1a2a;
  border-radius:8px;
  overflow:hidden;
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--accent),#a78bfa);
  border-radius:8px;
  transition:width .3s ease;
}

/* ─── Results ─── */
.results-section{display:none;margin-top:20px}
.results-section.show{display:block}
.results-header{
  font-size:.9rem;font-weight:700;margin-bottom:10px;
  color:var(--success);
}
.results-list{list-style:none}
.results-list li{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;font-size:.85rem;
  border-bottom:1px solid var(--border);
}
.results-list li:last-child{border-bottom:none}
.results-list .check{color:var(--success);font-weight:bold}

/* ─── Error ─── */
.error-box{
  display:none;
  background:#ff6b6b18;
  border:1px solid var(--error);
  border-radius:10px;
  padding:12px 16px;
  margin-top:16px;
  font-size:.85rem;
  color:var(--error);
}
.error-box.show{display:block}

/* ─── Spinner ─── */
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Upload progress ─── */
.upload-progress{
  display:none;margin-top:12px;
  font-size:.82rem;color:var(--text2);
  text-align:center;
}
.upload-progress.show{display:block}
</style>
</head>
<body>
<div class="container">
  <h1><span>5sec</span>_split</h1>
  <p class="subtitle">동영상을 원하는 초 단위로 분할합니다</p>

  <div class="card">
    <!-- Drop Zone -->
    <div class="dropzone" id="dropzone">
      <span class="dropzone-icon">🎬</span>
      <div class="dropzone-text">
        <strong>영상 파일을 여기에 드래그 &amp; 드롭</strong><br>
        또는 클릭하여 선택
      </div>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="upload-progress" id="uploadProgress">
      업로드 중...
    </div>

    <!-- File Info -->
    <div class="file-info" id="fileInfo">
      <span class="file-icon">🎞️</span>
      <div class="file-meta">
        <div class="file-name" id="fileName"></div>
        <div class="file-detail" id="fileDetail"></div>
      </div>
      <button class="file-remove" id="fileRemove" title="제거">✕</button>
    </div>

    <!-- Settings Form -->
    <div class="form-section" id="formSection">
      <div class="field">
        <label>분할 간격 (초)</label>
        <input type="number" id="interval" value="5" min="1" step="1" placeholder="예: 5">
        <div class="hint">영상을 이 간격(초)으로 잘라냅니다</div>
      </div>
      <div class="field">
        <label>저장 폴더 경로</label>
        <input type="text" id="outputDir" placeholder="예: /home/user/output">
        <div class="hint">폴더가 없으면 자동 생성됩니다</div>
      </div>
      <button class="btn btn-primary" id="splitBtn">
        ✂️ 분할 시작
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-label">
        <span>분할 진행 중...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection">
      <div class="results-header">분할 완료!</div>
      <ul class="results-list" id="resultsList"></ul>
      <button class="btn btn-secondary" id="newBtn">새 작업</button>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

const dropzone = $('dropzone');
const fileInput = $('fileInput');
const fileInfo = $('fileInfo');
const fileNameEl = $('fileName');
const fileDetailEl = $('fileDetail');
const formSection = $('formSection');
const splitBtn = $('splitBtn');
const progressSection = $('progressSection');
const progressPct = $('progressPct');
const progressFill = $('progressFill');
const resultsSection = $('resultsSection');
const resultsList = $('resultsList');
const errorBox = $('errorBox');
const uploadProgress = $('uploadProgress');
const outputDirInput = $('outputDir');

let currentFileId = null;

// --- 기본 저장 경로 ---
outputDirInput.value = './output';

// --- 유틸 ---
function formatDuration(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return h + '\uC2DC\uAC04 ' + m + '\uBD84 ' + s + '\uCD08';
  if (m > 0) return m + '\uBD84 ' + s + '\uCD08';
  return s + '\uCD08';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add('show');
}

function hideError() {
  errorBox.classList.remove('show');
}

function resetUI() {
  currentFileId = null;
  fileInfo.classList.remove('show');
  formSection.classList.remove('show');
  progressSection.classList.remove('show');
  resultsSection.classList.remove('show');
  uploadProgress.classList.remove('show');
  hideError();
  dropzone.style.display = '';
  progressFill.style.width = '0%';
  progressPct.textContent = '0%';
  resultsList.replaceChildren();
  splitBtn.disabled = false;
  setSplitBtnDefault();
}

function setSplitBtnDefault() {
  splitBtn.replaceChildren();
  splitBtn.append(document.createTextNode('\u2702\uFE0F \uBD84\uD560 \uC2DC\uC791'));
}

function setSplitBtnLoading() {
  splitBtn.replaceChildren();
  const spinner = document.createElement('div');
  spinner.className = 'spinner';
  splitBtn.appendChild(spinner);
  splitBtn.append(document.createTextNode(' \uBD84\uD560 \uC911...'));
}

// --- 드래그 앤 드롭 ---
['dragenter','dragover'].forEach(e => {
  dropzone.addEventListener(e, ev => { ev.preventDefault(); dropzone.classList.add('drag-over'); });
});
['dragleave','drop'].forEach(e => {
  dropzone.addEventListener(e, ev => { ev.preventDefault(); dropzone.classList.remove('drag-over'); });
});

dropzone.addEventListener('drop', ev => {
  const files = ev.dataTransfer.files;
  if (files.length > 0) handleFile(files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
});

$('fileRemove').addEventListener('click', resetUI);
$('newBtn').addEventListener('click', resetUI);

// --- 파일 업로드 ---
async function handleFile(file) {
  if (!file.type.startsWith('video/') && !(/\.(mp4|mkv|mov|avi|webm|flv|wmv|m4v)$/i).test(file.name)) {
    showError('\uB3D9\uC601\uC0C1 \uD30C\uC77C\uB9CC \uC5C5\uB85C\uB4DC\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4.');
    return;
  }

  hideError();
  dropzone.style.display = 'none';
  uploadProgress.classList.add('show');

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await res.json();

    uploadProgress.classList.remove('show');

    if (data.error) {
      showError(data.error);
      dropzone.style.display = '';
      return;
    }

    currentFileId = data.file_id;
    fileNameEl.textContent = data.filename;
    fileDetailEl.textContent = formatDuration(data.duration) + ' \u00B7 ' + formatSize(data.size);
    fileInfo.classList.add('show');
    formSection.classList.add('show');
  } catch (e) {
    uploadProgress.classList.remove('show');
    dropzone.style.display = '';
    showError('\uC5C5\uB85C\uB4DC \uC2E4\uD328: ' + e.message);
  }
}

// --- 결과 표시 (안전한 DOM 조작) ---
function renderResults(files) {
  resultsList.replaceChildren();
  for (const name of files) {
    const li = document.createElement('li');
    const check = document.createElement('span');
    check.className = 'check';
    check.textContent = '\u2713';
    li.appendChild(check);
    li.append(document.createTextNode(' ' + name));
    resultsList.appendChild(li);
  }
}

// --- 분할 실행 ---
splitBtn.addEventListener('click', async () => {
  if (!currentFileId) return;

  const interval = parseInt($('interval').value);
  const outputDir = outputDirInput.value.trim();

  if (!interval || interval < 1) {
    showError('\uBD84\uD560 \uAC04\uACA9\uC744 1\uCD08 \uC774\uC0C1 \uC785\uB825\uD574\uC8FC\uC138\uC694.');
    return;
  }
  if (!outputDir) {
    showError('\uC800\uC7A5 \uD3F4\uB354 \uACBD\uB85C\uB97C \uC785\uB825\uD574\uC8FC\uC138\uC694.');
    return;
  }

  hideError();
  splitBtn.disabled = true;
  setSplitBtnLoading();
  formSection.classList.remove('show');
  progressSection.classList.add('show');
  progressFill.style.width = '0%';
  progressPct.textContent = '0%';

  const formData = new FormData();
  formData.append('file_id', currentFileId);
  formData.append('interval', interval);
  formData.append('output_dir', outputDir);

  try {
    const res = await fetch('/api/split', { method: 'POST', body: formData });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));

        if (data.type === 'progress') {
          const pct = data.percent;
          progressFill.style.width = pct + '%';
          progressPct.textContent = Math.round(pct) + '%';
        }
        else if (data.type === 'done') {
          progressFill.style.width = '100%';
          progressPct.textContent = '100%';

          setTimeout(() => {
            progressSection.classList.remove('show');
            resultsSection.classList.add('show');
            renderResults(data.files);
          }, 400);
        }
        else if (data.type === 'error') {
          progressSection.classList.remove('show');
          formSection.classList.add('show');
          splitBtn.disabled = false;
          setSplitBtnDefault();
          showError(data.message);
        }
      }
    }
  } catch (e) {
    progressSection.classList.remove('show');
    formSection.classList.add('show');
    splitBtn.disabled = false;
    setSplitBtnDefault();
    showError('\uBD84\uD560 \uC694\uCCAD \uC2E4\uD328: ' + e.message);
  }
});
</script>
</body>
</html>
